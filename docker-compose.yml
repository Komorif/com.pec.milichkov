services:
  db:
    image: mysql:8.0
    container_name: final_project_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: rootroot
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: final_project_api
    restart: always
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: rootroot
    ports:
      - '8000:8000'
    depends_on:
      - db
    volumes:
      - ./backend:/var/www

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: final_project_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_DB: laravel
      PMA_USER: root
      PMA_PASSWORD: rootroot
    ports:
      - '8081:80'
    depends_on:
      - db

volumes:
  db_data:
