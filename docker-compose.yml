services:
  db:
    image: mysql:8.0
    container_name: final_project_db
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: rootroot
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: final_project_phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_DB: laravel
      PMA_USER: root
      PMA_PASSWORD: rootroot
    ports:
      - '8081:80'
    depends_on:
      - db

volumes:
  db_data:
